name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Build Debug APK
      run: |
        if [ -f gradlew ]; then
          echo "Found gradlew at root."
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        elif [ -f "live tv/gradlew" ]; then
          echo "Found gradlew inside 'live tv' folder."
          chmod +x "live tv/gradlew"
          cd "live tv" && ./gradlew assembleDebug --stacktrace
        else
          echo "Gradlew wrapper missing, falling back to global gradle build..."
          gradle assembleDebug --stacktrace
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LiveTV-Debug-APK
        path: "**/build/outputs/apk/debug/*-debug.apk" # مسار مرن يلتقط الـ APK أينما صُنع
        
